<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalidofit's Macro Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 relative bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop')] bg-cover bg-center bg-fixed">
    
    <div class="absolute inset-0 bg-slate-950/75"></div>

    <div class="relative z-10 max-w-2xl w-full bg-slate-800/80 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-600 p-6 md:p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                KALIDOFIT'S MACRO CALCULATOR
            </h1>
            <p class="text-slate-300 mt-2 font-medium">እንኳን በደህና መጡ! Discover your exact daily caloric and macro targets.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold mb-2">ፆታ (Gender)</label>
                <select id="gender" class="w-full bg-slate-700/80 border border-slate-500 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-400">
                    <option value="male">ወንድ (Male)</option>
                    <option value="female">ሴት (Female)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">እድሜ (Age in years)</label>
                <input type="number" id="age" value="25" class="w-full bg-slate-700/80 border border-slate-500 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-400">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">ክብደት (Weight in kg)</label>
                <input type="number" id="weight" value="70" class="w-full bg-slate-700/80 border border-slate-500 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-400">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">ቁመት (Height in cm)</label>
                <input type="number" id="height" value="175" class="w-full bg-slate-700/80 border border-slate-500 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-400">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">የእንቅስቃሴ ደረጃ (Activity Level)</label>
                <select id="activity" class="w-full bg-slate-700/80 border border-slate-500 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-400">
                    <option value="1.2">Sedentary (Office job, little exercise)</option>
                    <option value="1.375">Lightly Active (Light exercise 1-3 days/wk)</option>
                    <option value="1.55">Moderately Active (Moderate exercise 3-5 days/wk)</option>
                    <option value="1.725">Very Active (Hard exercise 6-7 days/wk)</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">የአካል ብቃት ግብዎ (Your Fitness Goal)</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setGoal('lose')" id="goal-lose" class="goal-btn py-3 px-2 md:px-4 rounded-lg bg-slate-700 border border-slate-600 font-medium hover:bg-slate-600 focus:outline-none transition text-sm">Lose Fat<br><span class="text-xs text-slate-400">ቀንስ</span></button>
                    <button onclick="setGoal('maintain')" id="goal-maintain" class="goal-btn py-3 px-2 md:px-4 rounded-lg bg-emerald-500 border border-emerald-400 font-medium text-slate-900 focus:outline-none transition text-sm">Maintain<br><span class="text-xs text-emerald-900">ጠብቅ</span></button>
                    <button onclick="setGoal('gain')" id="goal-gain" class="goal-btn py-3 px-2 md:px-4 rounded-lg bg-slate-700 border border-slate-600 font-medium hover:bg-slate-600 focus:outline-none transition text-sm">Gain Muscle<br><span class="text-xs text-slate-400">ጨምር</span></button>
                </div>
            </div>
        </div>

        <button onclick="calculate()" class="w-full mt-8 bg-gradient-to-r from-emerald-400 to-cyan-500 hover:from-emerald-500 hover:to-cyan-600 text-slate-950 font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-0.5">
            የእኔን ውጤት አስላ (Calculate My Targets)
        </button>

        <div id="results" class="hidden mt-8 pt-8 border-t border-slate-600">
            <h2 class="text-xl font-bold mb-4 text-center text-emerald-400">የእርስዎ ውጤቶች (Your Results)</h2>
            <div class="grid grid-cols-2 gap-4 text-center mb-6">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-600">
                    <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Your TDEE</span>
                    <div id="tdee-val" class="text-2xl font-extrabold text-white mt-1">0</div>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-emerald-500/50 ring-1 ring-emerald-500/30">
                    <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Target Calories</span>
                    <div id="target-calories" class="text-2xl font-extrabold text-emerald-400 mt-1">0</div>
                </div>
            </div>

            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Daily Macros Breakdown</h3>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-slate-750 p-3 rounded-lg border border-slate-600 bg-slate-800/80">
                    <div class="text-xs font-semibold text-amber-400">Protein</div>
                    <div id="protein-val" class="text-lg font-bold mt-1">0g</div>
                </div>
                <div class="bg-slate-750 p-3 rounded-lg border border-slate-600 bg-slate-800/80">
                    <div class="text-xs font-semibold text-cyan-400">Carbs</div>
                    <div id="carbs-val" class="text-lg font-bold mt-1">0g</div>
                </div>
                <div class="bg-slate-750 p-3 rounded-lg border border-slate-600 bg-slate-800/80">
                    <div class="text-xs font-semibold text-rose-400">Fats</div>
                    <div id="fats-val" class="text-lg font-bold mt-1">0g</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentGoal = 'maintain';

        function setGoal(goal) {
            currentGoal = goal;
            
            // Reset all buttons
            document.getElementById('goal-lose').className = "goal-btn py-3 px-2 md:px-4 rounded-lg bg-slate-700 border border-slate-600 font-medium hover:bg-slate-600 focus:outline-none transition text-sm";
            document.querySelector('#goal-lose span').className = "text-xs text-slate-400";
            
            document.getElementById('goal-maintain').className = "goal-btn py-3 px-2 md:px-4 rounded-lg bg-slate-700 border border-slate-600 font-medium hover:bg-slate-600 focus:outline-none transition text-sm";
            document.querySelector('#goal-maintain span').className = "text-xs text-slate-400";
            
            document.getElementById('goal-gain').className = "goal-btn py-3 px-2 md:px-4 rounded-lg bg-slate-700 border border-slate-600 font-medium hover:bg-slate-600 focus:outline-none transition text-sm";
            document.querySelector('#goal-gain span').className = "text-xs text-slate-400";

            // Highlight active button
            const activeBtn = document.getElementById(`goal-${goal}`);
            activeBtn.className = "goal-btn py-3 px-2 md:px-4 rounded-lg bg-emerald-500 border border-emerald-400 font-medium text-slate-900 focus:outline-none transition text-sm";
            document.querySelector(`#goal-${goal} span`).className = "text-xs text-emerald-900";
        }

        function calculate() {
            const gender = document.getElementById('gender').value;
            const age = parseFloat(document.getElementById('age').value);
            const weightKg = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);
            const activity = parseFloat(document.getElementById('activity').value);

            let bmr = 0;
            if (gender === 'male') {
                bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) + 5;
            } else {
                bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) - 161;
            }

            const tdee = Math.round(bmr * activity);
            let targetCalories = tdee;

            if (currentGoal === 'lose') targetCalories = Math.round(tdee - 500);
            if (currentGoal === 'gain') targetCalories = Math.round(tdee + 300);

            // Generate Balanced Macros (40% Carbs, 30% Protein, 30% Fat)
            const proteinGrams = Math.round((targetCalories * 0.30) / 4);
            const carbsGrams = Math.round((targetCalories * 0.40) / 4);
            const fatGrams = Math.round((targetCalories * 0.30) / 9);

            // Display Results
            document.getElementById('tdee-val').innerText = tdee + " kcal";
            document.getElementById('target-calories').innerText = targetCalories + " kcal";
            document.getElementById('protein-val').innerText = proteinGrams + "g";
            document.getElementById('carbs-val').innerText = carbsGrams + "g";
            document.getElementById('fats-val').innerText = fatGrams + "g";

            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
